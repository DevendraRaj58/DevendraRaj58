<svg viewBox="0 0 860 320" width="860" height="320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1c0303"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>

    <filter id="spiderGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="titleGlow" x="-10%" y="-10%" width="120%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      /* ── SPIDER-MAN DROP ── */
      @keyframes spiderDrop {
        0%   { transform: translateY(-320px); opacity: 0; }
        8%   { transform: translateY(-320px); opacity: 0; }
        24%  { transform: translateY(0px);    opacity: 1; }
        74%  { transform: translateY(0px);    opacity: 1; }
        88%  { transform: translateY(-320px); opacity: 0; }
        100% { transform: translateY(-320px); opacity: 0; }
      }

      /* ── HANGING WEB LINE ── */
      @keyframes hangLine {
        0%   { stroke-dashoffset: 168; }
        14%  { stroke-dashoffset: 0;   }
        74%  { stroke-dashoffset: 0;   }
        88%  { stroke-dashoffset: 168; }
        100% { stroke-dashoffset: 168; }
      }

      /* ── WEB SHOT STRAND 1 ── */
      @keyframes webShot1 {
        0%   { stroke-dashoffset: 380; opacity: 0; }
        52%  { stroke-dashoffset: 380; opacity: 0; }
        66%  { stroke-dashoffset: 0;   opacity: 0.9; }
        74%  { stroke-dashoffset: 0;   opacity: 0.9; }
        82%  { stroke-dashoffset: 380; opacity: 0; }
        100% { stroke-dashoffset: 380; opacity: 0; }
      }

      /* ── WEB SHOT STRAND 2 (slight delay) ── */
      @keyframes webShot2 {
        0%   { stroke-dashoffset: 380; opacity: 0; }
        56%  { stroke-dashoffset: 380; opacity: 0; }
        68%  { stroke-dashoffset: 0;   opacity: 0.45; }
        74%  { stroke-dashoffset: 0;   opacity: 0.45; }
        82%  { stroke-dashoffset: 380; opacity: 0; }
        100% { stroke-dashoffset: 380; opacity: 0; }
      }

      /* ── CORNER WEB FADE IN ── */
      @keyframes cornerIn {
        0%   { opacity: 0;    }
        24%  { opacity: 0;    }
        42%  { opacity: 0.32; }
        100% { opacity: 0.32; }
      }

      /* ── TITLE REVEAL ── */
      @keyframes titleIn {
        0%   { opacity: 0; }
        88%  { opacity: 0; }
        100% { opacity: 1; }
      }

      /* ── ROLE SUBTITLE ── */
      @keyframes sub1In {
        0%   { opacity: 0; }
        91%  { opacity: 0; }
        100% { opacity: 1; }
      }

      /* ── EDUCATION LINE ── */
      @keyframes sub2In {
        0%   { opacity: 0; }
        94%  { opacity: 0; }
        100% { opacity: 1; }
      }

      /* ── QUOTE ── */
      @keyframes quoteIn {
        0%   { opacity: 0; }
        96%  { opacity: 0; }
        100% { opacity: 0.42; }
      }

      /* Classes */
      .spider      { animation: spiderDrop 5.8s ease-in-out 1 forwards; }
      .hang-line   { stroke-dasharray: 168; animation: hangLine 5.8s linear 1 forwards; }
      .ws1         { stroke-dasharray: 380; animation: webShot1 5.8s ease-in-out 1 forwards; }
      .ws2         { stroke-dasharray: 380; animation: webShot2 5.8s ease-in-out 1 forwards; }
      .corner-web  { animation: cornerIn 5.8s ease 1 forwards; }
      .t-main      { animation: titleIn 5.8s ease 1 forwards; }
      .t-sub1      { animation: sub1In  5.8s ease 1 forwards; }
      .t-sub2      { animation: sub2In  5.8s ease 1 forwards; }
      .t-quote     { animation: quoteIn 5.8s ease 1 forwards; }
    </style>
  </defs>

  <!-- ═══ BACKGROUND ═══ -->
  <rect width="860" height="320" fill="url(#bgGrad)"/>

  <!-- ═══ TOP-LEFT CORNER WEB ═══ -->
  <g class="corner-web">
    <line x1="0" y1="0" x2="182" y2="0"   stroke="#cc0000" stroke-width="1.6"/>
    <line x1="0" y1="0" x2="0"   y2="182" stroke="#cc0000" stroke-width="1.6"/>
    <line x1="0" y1="0" x2="148" y2="98"  stroke="#cc0000" stroke-width="1.1" opacity="0.85"/>
    <line x1="0" y1="0" x2="98"  y2="148" stroke="#cc0000" stroke-width="1.1" opacity="0.85"/>
    <line x1="0" y1="0" x2="182" y2="58"  stroke="#cc0000" stroke-width="0.8" opacity="0.65"/>
    <line x1="0" y1="0" x2="58"  y2="182" stroke="#cc0000" stroke-width="0.8" opacity="0.65"/>
    <path d="M 40 0 Q 28 28 0 40"   fill="none" stroke="#cc0000" stroke-width="1.1"/>
    <path d="M 80 0 Q 56 56 0 80"   fill="none" stroke="#cc0000" stroke-width="1.0" opacity="0.88"/>
    <path d="M 120 0 Q 84 84 0 120" fill="none" stroke="#cc0000" stroke-width="0.9" opacity="0.72"/>
    <path d="M 160 0 Q 112 112 0 160" fill="none" stroke="#cc0000" stroke-width="0.8" opacity="0.55"/>
    <path d="M 182 0 Q 130 130 0 182" fill="none" stroke="#cc0000" stroke-width="0.7" opacity="0.38"/>
    <circle cx="5" cy="5" r="4.5" fill="#cc0000"/>
  </g>

  <!-- ═══ TOP-RIGHT CORNER WEB (mirror) ═══ -->
  <g class="corner-web" transform="translate(860,0) scale(-1,1)">
    <line x1="0" y1="0" x2="182" y2="0"   stroke="#cc0000" stroke-width="1.6"/>
    <line x1="0" y1="0" x2="0"   y2="182" stroke="#cc0000" stroke-width="1.6"/>
    <line x1="0" y1="0" x2="148" y2="98"  stroke="#cc0000" stroke-width="1.1" opacity="0.85"/>
    <line x1="0" y1="0" x2="98"  y2="148" stroke="#cc0000" stroke-width="1.1" opacity="0.85"/>
    <line x1="0" y1="0" x2="182" y2="58"  stroke="#cc0000" stroke-width="0.8" opacity="0.65"/>
    <line x1="0" y1="0" x2="58"  y2="182" stroke="#cc0000" stroke-width="0.8" opacity="0.65"/>
    <path d="M 40 0 Q 28 28 0 40"   fill="none" stroke="#cc0000" stroke-width="1.1"/>
    <path d="M 80 0 Q 56 56 0 80"   fill="none" stroke="#cc0000" stroke-width="1.0" opacity="0.88"/>
    <path d="M 120 0 Q 84 84 0 120" fill="none" stroke="#cc0000" stroke-width="0.9" opacity="0.72"/>
    <path d="M 160 0 Q 112 112 0 160" fill="none" stroke="#cc0000" stroke-width="0.8" opacity="0.55"/>
    <path d="M 182 0 Q 130 130 0 182" fill="none" stroke="#cc0000" stroke-width="0.7" opacity="0.38"/>
    <circle cx="5" cy="5" r="4.5" fill="#cc0000"/>
  </g>

  <!-- ═══ HANGING WEB LINE ═══ -->
  <line x1="425" y1="0" x2="425" y2="168"
        stroke="rgba(215,215,215,0.75)" stroke-width="1.5"
        class="hang-line"/>

  <!-- ═══ SPIDER-MAN FIGURE ═══ -->
  <g class="spider" filter="url(#spiderGlow)">

    <!-- Head (red mask) -->
    <ellipse cx="425" cy="156" rx="23" ry="25" fill="#cc0000"/>

    <!-- Eye patches (white — classic comic elongated teardrop) -->
    <path d="M405 149 Q413 138 424 145 Q418 154 405 151 Z" fill="white"/>
    <path d="M426 145 Q437 138 445 149 Q445 154 434 154 Z" fill="white"/>

    <!-- Neck -->
    <rect x="416" y="181" width="18" height="9" fill="#cc0000" rx="2"/>

    <!-- Torso -->
    <path d="M401 190 L449 190 L454 235 L396 235 Z" fill="#cc0000"/>

    <!-- Shorts (dark lower body) -->
    <path d="M396 222 L454 222 L454 235 L396 235 Z" fill="#0d0d1c"/>

    <!-- Spider logo on chest -->
    <ellipse cx="425" cy="206" rx="7" ry="4.2" fill="#0d0d1c"/>
    <line x1="418" y1="203" x2="408" y2="195" stroke="#0d0d1c" stroke-width="2.8" stroke-linecap="round"/>
    <line x1="432" y1="203" x2="442" y2="195" stroke="#0d0d1c" stroke-width="2.8" stroke-linecap="round"/>
    <line x1="418" y1="209" x2="408" y2="218" stroke="#0d0d1c" stroke-width="2.8" stroke-linecap="round"/>
    <line x1="432" y1="209" x2="442" y2="218" stroke="#0d0d1c" stroke-width="2.8" stroke-linecap="round"/>

    <!-- Left arm (web-shooter extended) -->
    <path d="M401 202 Q362 186 338 202" stroke="#cc0000" stroke-width="10" fill="none" stroke-linecap="round"/>
    <circle cx="338" cy="202" r="6.5" fill="#cc0000"/>

    <!-- Right arm -->
    <path d="M449 202 Q474 188 492 202" stroke="#cc0000" stroke-width="10" fill="none" stroke-linecap="round"/>
    <circle cx="492" cy="202" r="6.5" fill="#cc0000"/>

    <!-- Left leg -->
    <path d="M410 235 Q397 272 382 298" stroke="#0d0d1c" stroke-width="11" fill="none" stroke-linecap="round"/>
    <path d="M382 298 Q374 312 384 316" stroke="#cc0000" stroke-width="9" fill="none" stroke-linecap="round"/>

    <!-- Right leg -->
    <path d="M440 235 Q453 272 468 298" stroke="#0d0d1c" stroke-width="11" fill="none" stroke-linecap="round"/>
    <path d="M468 298 Q476 312 466 316" stroke="#cc0000" stroke-width="9" fill="none" stroke-linecap="round"/>

  </g>

  <!-- ═══ WEB SHOT (two strands from left wrist) ═══ -->
  <path d="M338 202 Q218 148 82 88"
        fill="none" stroke="rgba(218,218,218,0.88)" stroke-width="1.6"
        class="ws1"/>
  <path d="M338 202 Q210 172 68 132"
        fill="none" stroke="rgba(218,218,218,0.4)" stroke-width="1.0"
        class="ws2"/>

  <!-- ═══ TITLE TEXT (reveals after Spider-Man exits) ═══ -->

  <!-- Name -->
  <text x="430" y="165" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="41" font-weight="bold"
        fill="#ffffff" letter-spacing="2"
        class="t-main"
        filter="url(#titleGlow)">DEVENDRA RAJPUROHIT</text>

  <!-- Role line -->
  <text x="430" y="207" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="14.5" fill="#cc0000" letter-spacing="2"
        class="t-sub1">⚡  AI / ML ENGINEER  ·  AGENTIC AI DEVELOPER  ⚡</text>

  <!-- Education / location -->
  <text x="430" y="237" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="12" fill="#888888"
        class="t-sub2">B.Tech AI &amp; Data Science  •  Ajeenkya DY Patil University, Pune  •  CGPA 8.8 / 10</text>

  <!-- Quote -->
  <text x="430" y="297" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="11" fill="#666666" font-style="italic"
        class="t-quote">"With great power comes great responsibility."  — Uncle Ben</text>

</svg>
